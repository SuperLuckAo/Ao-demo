# Spring Boot 基础配置
server:
  port: 8080

# ========== 数据源（HikariCP 连接池）==========
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_demo?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    # HikariCP 连接池配置（可选，有默认值）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

# ========== MyBatis-Plus ==========
mybatis-plus:
  # Mapper XML 文件位置（如使用 XML 写 SQL）
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包路径，用于 typeAliases 与 resultType 简写
  type-aliases-package: cn.zhao.demo.entity
  # 全局配置：逻辑删除字段名、主键类型等
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  # 控制台打印 SQL（开发时可开启，生产建议关闭）
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
